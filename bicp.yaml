mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false

# ===== DNS（避免污染/泄漏）=====
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4

# ===== 节点 =====
proxies:
  - name: DMIT-AI
    type: ss
    server: bicp.duckdns.org
    port: 8388
    cipher: aes-128-gcm
    password: BICP@2026
    udp: true

# ===== 策略组 =====
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - DMIT-AI
      - DIRECT

# ===== 规则（核心）=====
rules:

  # ===== 本地/内网 =====
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT

  # ===== AI（强制走代理）=====
  - DOMAIN-KEYWORD,openai,PROXY
  - DOMAIN-KEYWORD,chatgpt,PROXY
  - DOMAIN-KEYWORD,anthropic,PROXY
  - DOMAIN-KEYWORD,claude,PROXY
  - DOMAIN-KEYWORD,perplexity,PROXY
  - DOMAIN-KEYWORD,poe,PROXY

  # ===== Google / Gemini =====
  - DOMAIN-KEYWORD,google,PROXY
  - DOMAIN-SUFFIX,gstatic.com,PROXY
  - DOMAIN-SUFFIX,googleapis.com,PROXY

  # ===== GitHub / 开发 =====
  - DOMAIN-KEYWORD,github,PROXY
  - DOMAIN-SUFFIX,githubusercontent.com,PROXY

  # ===== Microsoft / Office =====
  - DOMAIN-KEYWORD,microsoft,PROXY
  - DOMAIN-SUFFIX,office.com,PROXY

  # ===== Apple（账号走代理，CDN直连）=====
  - DOMAIN-SUFFIX,appleid.apple.com,PROXY
  - DOMAIN-SUFFIX,developer.apple.com,PROXY
  - DOMAIN-SUFFIX,apple.com,PROXY
  - DOMAIN-SUFFIX,cdn-apple.com,DIRECT
  - DOMAIN-SUFFIX,appleusercontent.com,DIRECT

  # ===== 常见海外服务 =====
  - DOMAIN-KEYWORD,amazon,PROXY
  - DOMAIN-KEYWORD,cloudflare,PROXY
  - DOMAIN-KEYWORD,docker,PROXY

  # ===== 中国大陆直连（关键核心）=====
  - GEOIP,CN,DIRECT

  # ===== 兜底 =====
  - MATCH,PROXY
